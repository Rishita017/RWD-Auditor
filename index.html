<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Responsive UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Adaptive Responsive Interface</h1>
    <p>Context-Aware & User-Centric Design</p>
  </header>

  <section class="controls">
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button onclick="toggleAccessibility()">Accessibility Mode</button>
  </section>

  <section class="info">
    <h2 id="deviceType"></h2>
  </section>

  <section class="features">
    <div class="card"> Mobile-First Layout</div>
    <div class="card"> Time-Based Theme</div>
    <div class="card"> Accessibility Mode</div>
    <div class="card"> User Customization</div>
  </section>

  <footer>
    <p> /p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
