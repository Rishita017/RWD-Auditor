<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header>
      <h1>Adaptive UI System</h1>
      <p>Context-Aware • Responsive • Accessible</p>
    </header>

    <div class="controls">
      <button onclick="toggleDarkMode()">🌙 Theme</button>
      <button onclick="toggleAccessibility()">♿ Accessibility</button>
    </div>

    <div class="status" id="deviceType"></div>

    <section class="cards">
      <div class="card"> Mobile First</div>
      <div class="card"> Time Awareness</div>
      <div class="card"> Accessibility</div>
      <div class="card"> Adaptive UI</div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
